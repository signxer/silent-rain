name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Windows ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Build GUI EXE
        shell: bash
        run: pyinstaller -F -w --icon=icon.ico --add-data="icon.png;." --add-data="VERSION;." --name=Moisten gui.py

      - name: Rename
        shell: bash
        run: mv dist/Moisten.exe "dist/Moisten-${{ steps.version.outputs.VERSION }}-Windows.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  # ── macOS ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Get version
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Create icon.icns
        run: |
          mkdir -p icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Clean Playwright local browsers
        run: |
          # 删除 Playwright 包内的本地浏览器缓存
          python3 -c "
          import playwright, os, shutil
          pkg_dir = os.path.dirname(playwright.__file__)
          for root, dirs, files in os.walk(pkg_dir):
              if '.local-browsers' in dirs:
                  shutil.rmtree(os.path.join(root, '.local-browsers'))
                  print(f'Removed: {os.path.join(root, \".local-browsers\")}')
          "

      - name: Build GUI .app
        run: pyinstaller -F -w --icon=icon.icns --add-data="icon.png:." --add-data="VERSION:." --name=Moisten gui.py

      - name: Create DMG
        run: |
          mkdir -p dmg-dist dist
          # 创建 .app 包装
          mkdir -p Moisten.app/Contents/MacOS
          mkdir -p Moisten.app/Contents/Resources
          cp dist/Moisten Moisten.app/Contents/MacOS/
          cp icon.png Moisten.app/Contents/Resources/
          cat > Moisten.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable><string>Moisten</string>
          <key>CFBundleIconFile</key><string>icon</string>
          <key>CFBundleName><string>Moisten</string>
          <key>CFBundleIdentifier</key><string>com.moisten.app</string>
          <key>CFBundleVersion</key><string>1.0</string>
          </dict></plist>
          EOF
          cp -r Moisten.app dmg-dist/
          ln -sf /Applications dmg-dist/Applications
          hdiutil create -volname Moisten -srcfolder dmg-dist -ov -format UDZO dist/Moisten-${{ steps.version.outputs.VERSION }}-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg

  # ── Release ──
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: find artifacts -type f

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

      - name: Sync to release repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_SYNC_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          # 从git commits自动生成更新日志
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..${TAG} --pretty=format:"- %s" --no-merges | head -20)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -10)
          fi
          # 更新CHANGELOG.md
          echo -e "\n## ${VER}\n${NOTES}\n$(cat CHANGELOG.md)" > CHANGELOG.md
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: CHANGELOG ${VER}"
          git push || true
          # 创建release
          gh release create "${TAG}" \
            --repo signxer/Moisten \
            --title "润物 Moisten ${TAG}" \
            --notes "$NOTES" \
            artifacts/**/* || true
          # 更新releases.json（含更新日志）
          WIN_SIZE=$(stat -c%s artifacts/**/*Windows*.exe 2>/dev/null || echo "0")
          MAC_SIZE=$(stat -c%s artifacts/**/*macOS*.dmg 2>/dev/null || echo "0")
          NOTES_JSON=$(echo "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")
          cat > /tmp/releases.json << EOF
          {"tag":"${TAG}","assets":[{"name":"Windows","file":"Moisten-${VER}-Windows.exe","size":${WIN_SIZE}},{"name":"macOS","file":"Moisten-${VER}-macOS.dmg","size":${MAC_SIZE}}],"notes":${NOTES_JSON}}
          EOF
          gh api repos/signxer/Moisten/contents/releases.json \
            --method PUT \
            --field message="update releases.json for ${TAG}" \
            --field content="$(base64 < /tmp/releases.json)" \
            --field sha="$(gh api repos/signxer/Moisten/contents/releases.json --jq '.sha')" || true

      - name: Cleanup artifacts
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[].id' | \
            while read id; do gh api repos/${{ github.repository }}/actions/artifacts/$id -X DELETE 2>/dev/null; done || true

      - name: Update VERSION in repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_SYNC_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          # 获取当前VERSION文件的SHA
          SHA=$(gh api repos/${{ github.repository }}/contents/VERSION --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            echo -n "$VER" | base64 > /tmp/version_b64
            gh api repos/${{ github.repository }}/contents/VERSION \
              --method PUT \
              --field message="chore: VERSION ${VER}" \
              --field content="$(echo -n "$VER" | base64)" \
              --field sha="$SHA" || true
          fi
