name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Windows ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build GUI EXE
        shell: bash
        run: pyinstaller -F -w --icon=icon.ico --add-data="icon.png;." --name=CCBU-Auto gui.py

      - name: Rename
        shell: bash
        run: mv dist/CCBU-Auto.exe "dist/CCBU-Auto-${{ steps.version.outputs.VERSION }}-Windows.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  # ── macOS ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create icon.icns
        run: |
          mkdir -p icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Clean Playwright local browsers
        run: |
          # 删除 Playwright 包内的本地浏览器缓存
          python3 -c "
          import playwright, os, shutil
          pkg_dir = os.path.dirname(playwright.__file__)
          for root, dirs, files in os.walk(pkg_dir):
              if '.local-browsers' in dirs:
                  shutil.rmtree(os.path.join(root, '.local-browsers'))
                  print(f'Removed: {os.path.join(root, \".local-browsers\")}')
          "

      - name: Build GUI .app
        run: pyinstaller -F -w --icon=icon.icns --add-data="icon.png:." --name=CCBU-Auto gui.py

      - name: Create DMG
        run: |
          mkdir -p dmg-dist dist
          # 创建 .app 包装
          mkdir -p CCBU-Auto.app/Contents/MacOS
          mkdir -p CCBU-Auto.app/Contents/Resources
          cp dist/CCBU-Auto CCBU-Auto.app/Contents/MacOS/
          cp icon.png CCBU-Auto.app/Contents/Resources/
          cat > CCBU-Auto.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>CCBU-Auto</string>
          <key>CFBundleIconFile</key><string>icon</string>
          <key>CFBundleName</key><string>CCBU-Auto</string>
          <key>CFBundleIdentifier</key><string>com.ccbu.auto</string>
          <key>CFBundleVersion</key><string>1.0</string>
          </dict></plist>
          EOF
          cp -r CCBU-Auto.app dmg-dist/
          ln -sf /Applications dmg-dist/Applications
          hdiutil create -volname CCBU-Auto -srcfolder dmg-dist -ov -format UDZO dist/CCBU-Auto-${{ steps.version.outputs.VERSION }}-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg

  # ── Release ──
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: find artifacts -type f

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

      - name: Sync to release repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_SYNC_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # 直接在 release 仓库创建 release 并上传文件
          gh release create "${TAG}" \
            --repo signxer/ccbu-auto-release \
            --title "润物细无声 ${TAG}" \
            --generate-notes \
            artifacts/**/* || true
          # 更新 releases.json
          WIN_SIZE=$(stat -c%s artifacts/**/*Windows*.exe 2>/dev/null || echo "0")
          MAC_SIZE=$(stat -c%s artifacts/**/*macOS*.dmg 2>/dev/null || echo "0")
          cat > /tmp/releases.json << EOF
          {"tag":"${TAG}","assets":[{"name":"Windows","file":"CCBU-Auto-${TAG}-Windows.exe","size":${WIN_SIZE}},{"name":"macOS","file":"CCBU-Auto-${TAG}-macOS.dmg","size":${MAC_SIZE}}]}
          EOF
          gh api repos/signxer/ccbu-auto-release/contents/releases.json \
            --method PUT \
            --field message="update releases.json for ${TAG}" \
            --field content="$(base64 < /tmp/releases.json)" \
            --field sha="$(gh api repos/signxer/ccbu-auto-release/contents/releases.json --jq '.sha')" || true
