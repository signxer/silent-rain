name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Windows ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers locally
        run: |
          set PLAYWRIGHT_BROWSERS_PATH=0
          python -m playwright install chromium

      - name: Build GUI EXE
        run: pyinstaller -F -w --icon=icon.ico --add-data="icon.png;." --name=CCBU-Auto gui.py

      - name: Rename
        shell: bash
        run: mv dist/CCBU-Auto.exe "dist/CCBU-Auto-${{ steps.version.outputs.VERSION }}-Windows.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  # ── macOS ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create icon.icns
        run: |
          mkdir -p icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Install Playwright browsers locally
        run: |
          export PLAYWRIGHT_BROWSERS_PATH=0
          python3 -m playwright install chromium

      - name: Build GUI .app
        run: |
          export PLAYWRIGHT_BROWSERS_PATH=0
          pyinstaller -F -w --icon=icon.icns --add-data="icon.png:." --name=CCBU-Auto gui.py

      - name: Create DMG
        run: |
          mkdir -p dmg-dist dist
          # 创建 .app 包装
          mkdir -p CCBU-Auto.app/Contents/MacOS
          mkdir -p CCBU-Auto.app/Contents/Resources
          cp dist/CCBU-Auto CCBU-Auto.app/Contents/MacOS/
          cp icon.png CCBU-Auto.app/Contents/Resources/
          cat > CCBU-Auto.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>CCBU-Auto</string>
          <key>CFBundleIconFile</key><string>icon</string>
          <key>CFBundleName</key><string>CCBU-Auto</string>
          <key>CFBundleIdentifier</key><string>com.ccbu.auto</string>
          <key>CFBundleVersion</key><string>1.0</string>
          </dict></plist>
          EOF
          cp -r CCBU-Auto.app dmg-dist/
          ln -sf /Applications dmg-dist/Applications
          hdiutil create -volname CCBU-Auto -srcfolder dmg-dist -ov -format UDZO dist/CCBU-Auto-${{ steps.version.outputs.VERSION }}-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg

  # ── Release ──

  # ── Release ──
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
